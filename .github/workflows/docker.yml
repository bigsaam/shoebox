name: Build & publish image

# Builds the shoebox image and pushes it to GHCR so the homelab can
# `docker compose pull` (and Watchtower auto-updates) instead of building on the
# host. Tags: `latest` on main, the short SHA always, and the version on `v*` tags.
#
# The image is only pushed if the test suite passes — the auth and path-traversal
# tests are the whole security boundary, so a red build must never reach the tunnel.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      # The Caddyfile is load-bearing: it pins forward_auth ahead of try_files.
      - name: Validate the Caddyfile
        run: |
          docker run --rm -v "$PWD/deploy/homelab/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --adapter caddyfile --config /etc/caddy/Caddyfile

  build:
    needs: test
    # Don't push from pull requests: no GHCR write, and no reason to.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/shoebox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Prune old GHCR image versions so per-commit `sha-…` tags don't pile up forever.
  # Keeps the 10 most recent versions (which always includes the current `latest`);
  # older ones are deleted. Runs only for main pushes and never fails the pipeline —
  # the image is already published by the time this runs.
  cleanup:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old container versions (keep last 10)
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: shoebox
          package-type: container
          min-versions-to-keep: 10
