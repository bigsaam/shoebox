# shoebox — password-gated preview server for throwaway static artifacts.
#
# Standalone compose on the external `utils` network. Deploy:
#   docker compose -f /docker/services/shoebox/compose.yml up -d
#
# Division of labour:
#   shoebox-tunnel  its own Cloudflare Tunnel, so a bad config here cannot drop
#                   mytube / tripwala / apprise on the shared utils tunnel
#   shoebox-caddy   serves bundle files, one origin per bundle, asks shoebox for authz
#   shoebox         authorizes requests and accepts uploads from the CLI
#
# Nothing binds a public port. shoebox binds only the Tailscale address, so
# `shoebox put` works from anywhere on the tailnet and nowhere else.
#
# If you would rather reuse the existing `utils` tunnel, delete the shoebox-tunnel
# service and add a `*.enzoiwith.us` ingress rule to it — but it must be placed
# second-to-last, ahead of the http_status:404 catch-all. See DEPLOY.md.

networks:
  utils:
    external: true

services:
  shoebox:
    image: ${SHOEBOX_IMAGE:-ghcr.io/bigsaam/shoebox:latest}
    container_name: shoebox
    restart: unless-stopped
    networks: [utils]
    env_file:
      - .env
    environment:
      - SHOEBOX_DATA_DIR=/data
      # One label deep, so Cloudflare's free *.enzoiwith.us certificate covers it.
      - SHOEBOX_HOST_TEMPLATE=share-{id}.enzoiwith.us
      - SHOEBOX_PUBLIC_SCHEME=https
      # Caddy owns file serving; shoebox only answers /_/authz and the API.
      - SHOEBOX_SERVE_FILES=false
    ports:
      # `tailscale ip -4` on manz-utils. Binding the Tailscale address (not 0.0.0.0)
      # keeps the upload API off the LAN while letting any tailnet host publish.
      - "${SHOEBOX_BIND_ADDR:-127.0.0.1}:8080:8080"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/_/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

  shoebox-caddy:
    image: caddy:2-alpine
    container_name: shoebox-caddy
    restart: unless-stopped
    networks: [utils]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Read-only, and rooted at bundles/ — metadata lives in ../meta and is unreachable.
      - ./data/bundles:/srv/bundles:ro
    depends_on:
      shoebox:
        condition: service_healthy

  # Dedicated tunnel. Copy cloudflared/config.yml.example -> cloudflared/config.yml
  # and drop the credentials JSON beside it (both gitignored; see that file's header).
  shoebox-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: shoebox-tunnel
    restart: unless-stopped
    networks: [utils]
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - shoebox-caddy
