# ALTERNATIVE: reuse the existing `utils` tunnel instead of shoebox's own.
#
# Prefer the dedicated tunnel (see cloudflared/config.yml.example). It has no
# ordering hazard and cannot take your other services down. Use this only if you
# would rather not manage a second tunnel credential.
#
# ⚠️  ORDER MATTERS. cloudflared returns the FIRST matching rule
#     (ingress.FindMatchingRule iterates in order), and its wildcard support is
#     ONLY a leading `*.` label — `share-*.enzoiwith.us` would never match.
#
#     So this rule must come AFTER every specific hostname and immediately BEFORE
#     the terminal `- service: http_status:404`. Placed last, mytube/tripwala/…
#     still match their own rules first; only unrouted hosts fall through here,
#     and shoebox-caddy 404s anything that is not a share-<id> host.
#
#     Every publish does NOT need a rule of its own. One wildcard covers them all.
#     Do not script edits to this file on publish: it also routes apprise, mytube,
#     tripwala and birds, and a bad write drops all of them.

# ... all existing specific hostnames stay above ...

- hostname: "*.enzoiwith.us"
  service: http://shoebox-caddy:80

- service: http_status:404

# DNS is the same either way: a proxied wildcard CNAME to whichever tunnel serves
# shoebox. `cloudflared tunnel route dns` will not create a wildcard.
#
#   *.enzoiwith.us  CNAME  <TUNNEL_ID>.cfargotunnel.com  (proxied)
